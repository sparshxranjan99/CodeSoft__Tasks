<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calculator</title>
    <link rel="stylesheet" href="calculator.css">
</head>
<body>
    <div class="calc">
        <input type="text" id="out" readonly>
        <div class="grid">
            <button onclick="v('')">C</button>
            <button onclick="v('b')">&#9003;</button>
            <button onclick="v('/')">&divide;</button>
            <button onclick="v('*')">&times;</button>
            <button onclick="v('7')">7</button><button onclick="v('8')">8</button><button onclick="v('9')">9</button>
            <button onclick="v('-')">&minus;</button>
            <button onclick="v('4')">4</button><button onclick="v('5')">5</button><button onclick="v('6')">6</button>
            <button onclick="v('+')">+</button>
            <button onclick="v('1')">1</button><button onclick="v('2')">2</button><button onclick="v('3')">3</button>
            <button onclick="v('=')">=</button>
            <button onclick="v('0')">0</button><button onclick="v('.')">.</button>
        </div>
    </div>
    <script src="calculator.js"></script>
</body>
</html>
